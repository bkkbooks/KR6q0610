body:
  text: 鄭十三娘嗣長慶安年十二歲時隨師姑到大溈才禮拜起大溈問這箇師姑什麼處住姑曰南臺江邊住溈山便喝出又問背後老婆甚處住十三娘放身近前叉手立山再問娘曰早箇呈似和尚了也山云去才下到法堂上師姑曰十三娘尋常道我會禪口似劍利今日被大師問著總無語娘曰苦哉苦哉作這箇眼目也道我行腳脫取衲衣來與十三娘著十三娘後又舉似羅山曰祗如十三娘參見溈山恁麼祗對還得平穩也無羅山云也不得無過娘云過在甚處羅山乃叱之娘云錦上更添花
