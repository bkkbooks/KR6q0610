body:
  text: 玄沙示衆云諸方老宿盡道接物利生忽遇三種病人來作麼生接患盲者拈槌竪拂他又不見患聾者語言三昧他又不聞患啞者教伊說又說不得且作麼生接若接此人不得佛法無靈驗當時地藏琛禪師在會出曰某甲有眼耳和尚作麼生接師曰慚愧便歸方丈
