body:
  text: 郢州大陽明安大師嗣梁山諱警玄因問梁山如何是無相道場梁指觀音曰此是呉處士畫師擬進語梁急索云這箇是有相底那箇是無相底師於言下領悟作禮却依本位立梁云何不道取一句來師曰道即不辭恐難上紙墨梁乃印可
