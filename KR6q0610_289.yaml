body:
  text: 雪峰岩頭欽山三人爲伴遍訪宗師後至灃州欽山先住二人同到鰲山阻雪之次岩頭毎日祗是打睡雪峰一向坐禪一日喚曰師兄師兄且起岩曰作什麼峰云今生不著便共文邃箇漢行脚到處被他帶累今與師兄到此祗管打睡岩喝曰噇眠去毎日牀上坐恰似深村裡土地相似他時後日魔魅人家男女去在峰點胸曰某甲這裏未穩在實不敢自瞞岩曰我將謂你他時後日向孤峰頂上盤結草庵播揚大教猶作這箇語話峰曰某甲實未穩在岩云若實如此據你見處一一通來是處與你證明不是處與你鋤却峰曰某甲初到鹽官處見鹽官説色空義此時得箇入處岩曰三十年後切忌擧著又見洞山過水悟道偈云切忌隨他覓迢迢與我疎我今獨自往處處得逢渠渠今正是我我今不是渠應須恁麼會方得契如如因比偈亦有省處岩云若恁麼自救也未徹在峰又云後問徳山和尚從上宗乘中事學人還有分也無徳山打一棒云道什麼某甲此時如桶底脱相似岩喝云你豈不見道從門入者不是家珍峰曰如何即是岩曰他後若欲播揚大教一一從自己胸襟流出將來與我蓋天蓋地去峰言下大悟便禮拜起來連聲叫曰今日始是鰲山成道今日始是鰲山成道
