body:
  text: 鎮州臨濟院慧照大師嗣黃蘗諱義玄師在黃蘗會下三年行業純一首座歎曰雖然是後生與衆有異首座問上座在此多少時也師曰三年也首座曰曾參問也無師曰不曾參問不知問箇什麼首座曰汝何不去問堂頭和尚如何是佛法的的大意師便去問問聲未絶黃蘗便打師下來首座云問話作麼生師曰某甲問聲未絶和尚便打某甲不會首座云但去問師又去問黃蘗又打如是三致問三打之師來白首座曰幸蒙慈悲令某甲問訊和尚三度發問三度喫棒自恨障緣不領深旨今且辭去首座曰汝若去須辭和尚了去師禮拜退首座先到堂頭處云問話底後生甚是如法若來辭和尚時方便接伊已後穿鑿成一株大樹與天下人作蔭涼去在師便上去辭黃蘗蘗曰不得往別處去汝向高安灘頭大愚處去必為汝說師到大愚大愚問什麼處來師曰黃蘗來愚云黃蘗有何言句師曰某甲三度問佛法的的大意三度喫棒不知某甲有過無過愚曰黃蘗恁麼老婆為汝得徹困更來這裡問有過無過師言下大悟曰元來黃蘗佛法無多子大愚撮住云這尿牀鬼子適來言道有過無過如今却道黃蘗佛法無多子你見什麼道理速道速道師於大愚脅下築三拳大愚拓開云汝師黃蘗非干我事師辭大愚却回黃蘗黃蘗見來便問這漢來來去去有什麼了期師曰祗為老婆心切便人事了侍立蘗問什麼處來師曰昨日和尚慈悲令參大愚去來蘗云大愚有何言句師舉大愚問某甲黃蘗有何言句某甲遂舉前話問他有過無過大愚道黃蘗恁麼老婆為汝得徹困更道有過無過某甲於言下大悟蘗云作麼生得這漢來待痛與一頓師曰說什麼待來即今便喫隨後便掌蘗云者風顛漢來這裡捋虎鬚師便喝蘗云侍者引這風顛漢參堂去
