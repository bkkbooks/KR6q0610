  text: 鄂州清平山法喜禪師嗣翠微諱令遵問翠微曰如何是西來的的意翠微曰待無人即向你道師良久曰無人也請師説翠微下禪牀引師入竹園師又云無人也請和尚説翠微指竹云這竿得恁麼長那竿得恁麼短
