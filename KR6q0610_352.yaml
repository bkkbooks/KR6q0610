body:
  text: 長沙招賢景岑禪師因有僧問如何是陀羅尼師乃指禪牀左邊云這箇師僧却誦得又問別有人誦得否師復指禪牀右邊云這箇師僧亦誦得曰某甲爲甚不聞云大徳豈不知道眞誦無響眞聽無聞曰與麼則音聲不入法界性也師云離色求觀非正見離聲求聽是邪聞
