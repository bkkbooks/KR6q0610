body:
  text: 潭州漸源仲興禪師嗣道吾因同道吾去一家弔慰次師乃拊棺曰生耶死耶吾曰生也不道死也不道師曰為甚不道吾曰不道不道回至中路師曰和尚快與某甲道若不道打和尚去也吾曰打即任打道即不道師便打吾數拳吾歸院云汝宜離此去恐知事得知不便道吾遷化後師至石霜舉前話請益霜曰生也不道死也不道師曰為甚不道霜曰不道不道師言下有省
