body:
  text: 南嶽山大慧禪師嗣曹溪諱懷讓參六祖祖曰從什麼處來師曰嵩山安國師處來祖曰是什麼物恁麼來師罔措於是執侍八年方省前話乃告祖云懷讓會得當初來時和尚接某甲是什麼物恁麼來祖云你作麼生會師曰說似一物即不中祖曰還假修證否師曰修證即不無染汚即不得祖曰祗此不染汚是諸佛之所護念汝亦如是吾亦如是乃至西天諸祖亦如是
