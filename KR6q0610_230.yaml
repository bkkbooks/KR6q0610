body:
  text: 雲蓋山志安禪師嗣石霜在石霜會時有僧問石霜萬戶俱閉時如何霜云堂中事作麼生僧經半年方始道得云無人接渠霜曰道也太煞道只道得八九成時師聞却禮請石霜為道霜不道師乃抱霜從方丈後去坐曰和尚若不道須打和尚去霜曰得在師乃禮拜不住霜云無人識渠師於言下大悟
