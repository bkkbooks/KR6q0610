body:
  text: 道吾山宗智禪師嗣藥山離藥山到南泉泉問闍梨名什麼師曰宗智泉曰智不到處作麼生宗師曰切忌道著泉云灼然道著即頭角生至三日後師與雲岩在後架把針次泉過見乃再問前日道智不到處切忌道著道著即頭角生合作麼生行履師便抽身入僧堂泉便去師却來坐岩乃問師兄適來為甚不祗對和尚師曰你得與麼靈利岩不薦却去問泉云適來因緣智頭陀作麼生不祗對和尚泉云他却是異類中行岩曰如何是異類中行泉云不見道智不到處切忌道著道著即頭角生直須向異類中行岩亦不會師知岩不薦乃曰此人因緣不在此便與回藥山山覩二人回乃問岩汝到甚處去來岩曰到南泉山曰泉有何言句岩遂舉前話山曰子作麼生會他這箇時節便回來岩無對山乃大笑岩便問如何是異類中行山曰吾今日困別時來岩曰某甲特為此事歸來山曰且去岩便出師在方丈外聞岩不薦不覺咬得指頭血出師却來問岩曰師弟去問和尚那因緣作麼生岩曰和尚不為某甲說師便低頭師與雲岩同時到藥山次山云智不到處切忌道著道著即頭角生師便珍重出去岩遂問智師兄為什麼不祗對和尚山曰我今日背痛是他却會汝去問取岩遂問師兄適來為甚不祗對和尚師曰我今日頭痛你去問取和尚後雲岩遷化遣人馳辭書師覽後曰雲岩不知有悔當時不向伊道然雖如是要且不違藥山之子
