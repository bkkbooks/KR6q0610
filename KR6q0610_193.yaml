body:
  text: 洞山悟本大師參雲岩問無情說法什麼人得聞岩曰無情說法無情得聞師曰和尚聞否岩曰我若得聞汝即不聞吾說法也師云若恁麼即某甲不聞和尚說法也岩曰我說法汝尚不聞何況無情說法也師乃述偈呈雲岩曰也太奇也太奇無情說法不思議若將耳聽聲不現眼處聞聲方得知
