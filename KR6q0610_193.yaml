body:
  text: 洞山悟本大師參雲岩問無情説法什麼人得聞岩曰無情説法無情得聞師曰和尚聞否岩曰我若得聞汝即不聞吾説法也師云若恁麼即某甲不聞和尚説法也岩曰我説法汝尚不聞何況無情説法也師乃述偈呈雲岩曰也太奇也太奇無情説法不思議若將耳聽聲不現眼處聞聲方得知
