body:
  text: 長沙縣景岑禪師因竺尚書問蚯蚓斬為兩段兩頭俱動未審佛性在阿那箇頭師曰莫妄想書曰爭奈動何師曰會即風火未散書無對師却喚尚書書應諾師曰不是尚書本命書曰不可離却即今祗對有第二箇主人公也師曰不可喚尚書作今上也書曰與麼則總不祗對和尚莫是弟子主人公否師曰非但祗對不祗對老僧從無始劫來是箇生死根本乃示頌云學道之人不識真祗為從前認識神無始劫來生死本癡人喚作本來人
