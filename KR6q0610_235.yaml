body:
  text: 雪峰山畔有一僧卓庵多年不剃頭自作一柄木杓去溪邊舀水喫時有僧問如何是祖師西來意庵主云溪深杓柄長僧歸舉似雪峰峰曰也甚奇怪雖然如是須是老僧勘過始得峰一日同侍者將剃刀去訪他才相見便問道得即不剃汝頭庵主便將水洗頭師便與他剃却
