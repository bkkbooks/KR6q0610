body:
  text: 潭州龍山和尚嗣馬祖因洞山與密師伯到乃問此山無路闍梨向甚處來曰和尚從何而入曰我不曾雲水曰和尚住此山多少時曰春秋不渉曰和尚先住此山先住曰不知曰爲甚不知曰我不爲人天來曰和尚得何道理便住此山曰我見兩箇泥牛鬪入海直至如今無消息
