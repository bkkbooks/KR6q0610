body:
  text: 百丈涅槃和尚問南泉從上諸聖還有不為人說底法麼泉曰不是心不是佛不是物師曰說了也泉曰某甲祗恁麼和尚又如何師云我不是善知識爭知有說不說泉云某甲不會師曰太煞為汝說也
