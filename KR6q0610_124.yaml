body:
  text: 撫州疏山光仁禪師嗣洞山有僧為造壽塔了來白疏山師問僧汝將多少錢與匠人僧云一切在和尚師曰為將三文錢與匠人為將兩文錢與匠人為將一文錢與匠人若道得與吾親造塔僧無對羅山時在大庾嶺住庵其僧到羅山山問甚處來僧云疏山來羅山云近日有何言句僧舉前話羅山云還有人道得也未僧云未有人道得羅山云汝却回舉似疏山道大庾嶺聞舉云若將三文錢與匠人和尚此生決定不得塔若將兩文錢與匠人和尚與匠人共出一隻手若將一文錢與匠人滯纍匠人眉鬚墮落其僧便回舉似疏山師聞舉此語便具威儀望大庾嶺頭禮拜讃歎云將謂無人大庾嶺有古佛放光射到此問却向僧云汝去向大庾嶺道猶如臘月蓮花僧復持此語舉似羅山山曰早已龜毛長數尺
