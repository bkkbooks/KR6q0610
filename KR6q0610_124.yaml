body:
  text: 撫州疎山光仁禪師嗣洞山有僧爲造壽塔了來白疎山師問僧汝將多少錢與匠人僧云一切在和尚師曰爲將三文錢與匠人爲將兩文錢與匠人爲將一文錢與匠人若道得與吾親造塔僧無對羅山時在大庾嶺住庵其僧到羅山山問甚處來僧云疎山來羅山云近日有何言句僧擧前話羅山云還有人道得也未僧云未有人道得羅山云汝却廻擧似疎山道大庾嶺聞擧云若將三文錢與匠人和尚此生決定不得塔若將兩文錢與匠人和尚與匠人共出一隻手若將一文錢與匠人滯累匠人眉鬚墮落其僧便廻擧似疎山師聞擧此語便具威儀望大庾嶺頭禮拜讃歎云將謂無人大庾嶺有古佛放光射到此問却向僧云汝去向大庾嶺道猶如臘月蓮花僧復持此語擧似羅山山曰早已龜毛長數尺
