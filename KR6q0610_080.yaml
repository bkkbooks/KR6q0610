body:
  text: 大溈一日臥次仰山來師乃轉面向壁臥仰曰某甲是和尚弟子不用形迹師作起勢仰便出師召曰寂子仰回頭師云聽老僧說箇夢仰低頭作聽勢師曰為我原看仰取一盆水一條手巾來師遂洗面了才坐香嚴入來師云我適來與寂子作一上神通不同小小嚴曰某甲在下面了了得知師曰子試道看香嚴乃點一碗茶來師歎曰二子神通智慧過於鶖子目連
