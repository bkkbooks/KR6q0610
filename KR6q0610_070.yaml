  text: 洪州百丈大智禪師嗣馬祖諱懷海再參馬祖祖舉拂子師曰即此用離此用祖掛拂子於舊處師侍立少頃祖云你已後鼓兩片皮如何為人師取拂子舉起祖曰即此用離此用師掛拂子於舊處祖便喝師後謂黃蘗云我當時被馬祖一喝直得三日耳聾
