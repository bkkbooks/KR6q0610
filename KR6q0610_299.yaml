body:
  text: 棗樹和尚嗣黄龍機因僧辭乃云若到諸方有人問你老僧此間法道作麼生對僧曰待他問即道師曰何處有無口底佛僧曰祗這也還難師竪起拂子云還見麼曰何處有無眼底佛師云祗這也還難僧遶禪床一匝出師云善能祗對僧喝師曰老僧不識子僧曰要識作麼師敲牀三下
