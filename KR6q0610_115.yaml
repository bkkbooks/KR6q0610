body:
  text: 秀州華亭縣船子和尚嗣藥山諱徳誠與道吾雲岩倶在藥山分袂後師在華亭浮一小舟師囑道吾曰師兄向後有伶利座主爲指一箇來因夾山善會禪師初住潤州京口時道吾雲岩遊到遇上堂有僧問如何是法身夾山曰法身無相僧曰如何是法眼夾山曰法眼無瑕道吾不覺失笑夾山纔見便下座請道吾禮請問曰某甲適來祗對僧話必有不是致令上座失笑望上座不悋慈悲吾曰和尚一等是出世未有師在夾山曰某甲甚處不是望爲説破吾曰某甲終不説吾有同行在華亭船上接人請和尚往彼見他必有所得夾曰此人如何吾曰此人上無片瓦下無寸土和尚若去須更衣服裝束夾乃依教散衆易服直造華亭船子纔見便問大徳住什麼寺夾曰寺即不住住即不似師曰汝道不似又不似箇什麼夾曰不是目前法師曰甚處學得來夾曰非耳目之所到師曰一句合頭語萬劫繋驢橛又問垂絲千尺意在深潭離釣三寸子何不道夾擬開口師便以篙打落水中夾纔出水上船師曰道道夾又擬開口師又打夾山於是忽然大悟乃點頭三下師曰竿頭絲線從君弄不犯清波意自殊夾山遂問抛綸擲釣師意如何師曰絲懸緑水浮定有無之意夾云語帶玄而無路舌頭談而不談師曰釣盡江波金鱗始遇夾乃掩耳師云如是如是遂囑云汝向後直須藏身處沒蹤跡沒蹤跡處莫藏身吾在藥山三十年祗得明斯事汝今既得他後莫住城隍聚落但向深山裏钁頭邊接取一箇半箇嗣續吾宗無令斷絶夾山領旨禮辭上岸而行頻頻囘顧師遂喚曰闍梨夾囘首師以竪起船橈云汝將謂別有言訖踏翻船沒於烟浪
