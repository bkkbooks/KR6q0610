body:
  text: 百丈因侍馬祖行次忽見一群野鴨子飛過祖云是什麼師云野鴨子祖云甚處去也師曰飛過去祖遂把師鼻頭扭師負痛失聲叫阿哪阿哪祖云又道飛過去元來只在這裏師直得浹背汗流因茲有省師次日赴參衆才集乃出卷却禮拜簟祖便下座歸方丈次問師我適來上堂未曾説話你為甚便卷却簟子師曰昨日被和尚扭得鼻頭痛祖曰你昨日向甚處留心師曰今日鼻頭又不痛也祖云你深知今日事師乃作禮退
