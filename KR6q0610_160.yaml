body:
  text: 壽州良遂座主嗣麻谷初參麻谷谷見來便將鋤頭去鋤草師到鋤草處谷殊不顧便歸方丈閉却門師次日復去谷又閉關師遂敲門谷乃問阿誰師曰良遂纔稱名字忽爾契悟乃曰和尚莫瞞良遂若不來禮拜和尚洎合被經論賺過一生及歸講肆開演有云諸人知處良遂總知良遂知處諸人不知終罷講徒散
