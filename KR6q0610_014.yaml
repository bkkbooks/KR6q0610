body:
  text: 黃蘗山斷際禪師初黃蘗捨衆入大安精舍混迹勞侶掃灑殿堂時裴休相國入寺燒香主事祗接因觀壁畫乃問是何圖像主事對曰高僧真儀公曰真儀可觀高僧何在衆皆無對相國曰此間有禪人否僧曰近有一僧投寺執役頗似禪者公曰可請來詢問得否於是遽尋運師相國公覩之欣然曰休適有一問諸德吝辭今請上人代酬一語師曰請相國垂問公即舉前問師朗聲云相國公應諾師曰在什麼處公當下有省如獲髻珠曰吾師真善知識也再請開堂
