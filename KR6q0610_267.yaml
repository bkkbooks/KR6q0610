body:
  text: 第二十八祖菩提達磨尊者嗣般若多羅尊者諡曰圓覺大師將返西天謂門人云時將至矣汝等蓋言所得乎時門人道副曰如吾所見不執文字不離文字而為道用師云汝得吾皮尼惣持曰如我今所解如慶喜見阿閦佛國一見更不再見師云汝得吾肉道育云四大本空五蘊非有而我見處無一法可得師曰汝得吾骨最後慧可出禮拜後依位而立師曰汝得吾髓於是傳法付衣
