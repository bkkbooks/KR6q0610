  text: 漳州保福院清豁禪師嗣睡龍參睡龍一日問豁闍梨見何尊宿來還悟也未曰清豁嘗訪大章得箇信處睡龍於是上堂集大衆召曰清豁闍梨出對衆燒香説悟處老僧與汝證明師拈香曰香已拈悟即不悟睡龍大悅而許之
