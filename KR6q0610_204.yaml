body:
  text: 疎山到潙山便問承師有言有句無句如藤倚樹忽然樹倒藤枯句歸何處潙山呵呵大笑師云某甲四千里賣布單來和尚何得相弄潙山喚侍者曰取錢還者上座遂囑曰向後有獨眼龍爲子點破去在後到明招擧前話招曰潙山可謂頭正尾正只是不遇知音師問樹倒藤枯句歸何處招曰更使潙山笑轉新師於言下有省乃曰潙山元來笑裏有刀
