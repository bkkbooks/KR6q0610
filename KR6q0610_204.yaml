body:
  text: 疏山到溈山便問承師有言有句無句如藤倚樹忽然樹倒藤枯句歸何處溈山呵呵大笑師云某甲四千里賣布單來和尚何得相弄溈山喚侍者曰取錢還者上座遂囑曰向後有獨眼龍為子點破去在後到明招舉前話招曰溈山可謂頭正尾正只是不遇知音師問樹倒藤枯句歸何處招曰更使溈山笑轉新師於言下有省乃曰溈山元來笑裏有刀
