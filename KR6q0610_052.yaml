body:
  text: 杭州龍册寺道怤禪師嗣雪峰因僧問新年頭還有佛法也無師曰有僧曰如何是新年頭佛法師曰元正啓祚萬物咸新僧云謝和尚答話師曰老僧今日失利又僧問明教新年頭還有佛法也無教曰無僧曰年年是好年日日是好日爲什麼却無教曰張翁喫酒李翁醉僧曰老老大大龍頭蛇尾師曰老僧今日失利
