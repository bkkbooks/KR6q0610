body:
  text: 仰山住東平時溈山附書并鏡一面至師升堂受書乃提起鏡子示衆云大衆溈山將鏡來而今且道是溈山鏡東平鏡若道是東平鏡又是溈山寄來若道是溈山鏡又在東平手裡道得即存取道不得則打破去也如是三舉衆皆無對師乃撲破
