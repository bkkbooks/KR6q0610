  text: 昇州清涼院大法眼禪師嗣地藏諱文益以玄機一發雜務倶捐結侶擬之湖外既行値天雨忽作溪流暴漲暫寓城西地藏院因參老琛和尚琛問曰上座何往師曰邐迤行脚去琛曰行脚事作麼生師曰不知琛曰不知是最親切師豁然大悟
