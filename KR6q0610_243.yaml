body:
  text: 漳州清豁禪師因僧問家貧遭劫時如何師曰不能盡底去僧云為什麼不能盡底去師云賊是家親僧曰既是家親為什麼翻成家賊師云內既無應外不能為僧曰忽然捉敗功歸何處師云賞亦未曾聞僧云恁麼即勞而無功師曰功則不無成而不處僧曰既是成功為甚麼不處師曰不見道太平本是將軍致不使將軍見太平
