body:
  text: 撫州金峰從志禪師嗣曹山一日上堂喫糊餅次乃拈一箇從上板頭轉一匝大衆見一一合掌師曰假饒十分抬起手也只得一半至晚間請益有僧曰今日和尚行糊餅見衆僧合掌却曰假饒十分抬起手也只得一半請和尚全道師以手作拈起糊餅勢云會麼僧云不會師云金峰也始道得一半
