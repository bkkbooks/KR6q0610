body:
  text: 灃州龍潭崇信禪師嗣天皇作餅爲業禮天皇和尚出家皇謂云汝執侍吾已後爲汝説心要法門凡經一載師曰來時和尚許説心要法門至今未蒙指示皇云吾爲汝説來久矣師曰何處是和尚爲某説皇云你若不審我則合掌我若坐時汝則侍立汝擎茶來吾爲汝受師良久皇云見則便見擬思即差師乃大悟
