  text: 灃州龍潭崇信禪師嗣天皇作餅為業禮天皇和尚出家皇謂云汝執侍吾已後為汝說心要法門凡經一載師曰來時和尚許說心要法門至今未蒙指示皇云吾為汝說來久矣師曰何處是和尚為某說皇云你若不審我則合掌我若坐時汝則侍立汝擎茶來吾為汝受師良久皇云見則便見擬思即差師乃大悟
