body:
  text: 趙州眞際大師問南泉如何是道泉曰平常心是道師曰還可趣向否泉曰擬向即乖師曰不擬又爭知是道泉曰道不屬知不知知是妄覺不知是無記若眞達不疑之道猶如太虚廓然蕩豁豈可強是非耶師言下頓悟玄旨
