body:
  text: 疏山示衆云病僧咸通年已前會法身邊事咸通年已後會法身向上事雲門出問云如何是法身邊事師曰枯樁曰如何是法身向上事師曰非枯樁門曰還許學人說道理也無師曰許門曰只如枯樁豈不是明法身邊事師曰是門曰非枯樁豈不是明法身向上事師曰是門曰未審法身還該一切也無師曰法身周遍爭得不該門指淨瓶曰淨瓶上還有法身也無師曰莫向淨瓶邊覓門曰𠰚𠰚
