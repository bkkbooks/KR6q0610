body:
  text: 洪州西山亮座主嗣馬祖因參馬祖祖問講什麼經師曰心經祖曰將什麼講師曰將心講祖曰心如工伎兒意如和伎者六識為伴侶爭解講得經師曰心既講不得莫是虛空講得麼祖曰却是虛空講得師拂袖而去祖召曰座主師回首祖曰從生至老只是這箇師因而有省遂隱西山更無消息
