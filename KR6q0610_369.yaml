body:
  text: 天平從漪和尚嗣洪進行腳在西院常云今時莫道會佛法只覓箇話底人也難得一日從西院法堂下過西院高聲喚從漪平舉首西院曰錯平行三兩步院又曰錯平近前西院曰適來這兩錯是老僧錯是上座錯平曰是從漪錯西院曰錯錯平休去少頃西院曰上座且在這裏度夏待與你商量這兩錯平當時便行後住天平謂衆云老僧當年行腳時被風吹到汝州西院有箇思明長老處勘我連下兩錯更留我過夏待共我商量我不道恁麼時錯我發足向南方行時早知道錯了也
