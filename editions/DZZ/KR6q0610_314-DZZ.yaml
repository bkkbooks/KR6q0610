  text: 隨州智門師寛禪師嗣雲門亦云明教因遊山廻首座與大衆出松行接首座曰和尚遊山巇嶮不易師拈拄杖云全得這箇力首座乃進前奪却抛向一邊師放身倒大衆遂進前扶起師拈拄杖一時趁散廻顧侍者云向你道全得這箇力
