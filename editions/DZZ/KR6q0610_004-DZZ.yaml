body:
  text: 吉州青原山弘濟禪師嗣大鑑諱行思曾問石頭你從甚處來石頭曰曹溪來師乃拈拂子曰曹溪還有這箇麼頭曰非但曹溪西天亦無師曰子莫曾到西天否頭曰若到即有也師曰未在更道頭曰和尚也須道取一半莫全靠希遷師云不辭向汝道恐已後無人承當
