body:
  text: 玄則禪師嗣法眼在法眼會中一日眼云你在此間多少時耶師曰在和尚會已得三年眼云你是後生尋常何不問事師曰某甲不敢瞞和尚某甲曾在青峰處得箇安樂處眼云你因甚語得入師曰曾問青峰如何是學人自己峰云丙丁童子來求火眼云好語祗恐你不會師云丙丁屬火將火求火似將自己覓自己眼云情知你不會佛法若如是不到今日師乃操悶便起至中路却云他是五百人善知識道我不是必有長處却囘懺悔便問如何是學人自己眼云丙丁童子來求火師言下大悟
  hash: sha256:17ed2f8fde5b76ae6b7c7d2b1f225eb524630d7a4a72d825557e8417103b4640
