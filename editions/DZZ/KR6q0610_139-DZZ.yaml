  text: 雲岩問道吾大悲菩薩用許多手眼作什麼吾曰如人夜間背手摸枕子師曰我會也我會也吾云你作麼生會師曰遍身是手眼吾曰道即太煞道祗道得八九成師曰師兄作麼生吾曰通身是手眼
