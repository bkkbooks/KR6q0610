body:
  text: 明州天童山景徳寺咸啓禪師嗣洞山因有僧問學人卓卓上來請師的的師曰我這裡一屙便了有什麼卓卓的的僧曰和尚與麼對話更買草鞋行脚好師云近前來僧近前師云只如老僧與麼祗對過在什麼處僧無對師便打
