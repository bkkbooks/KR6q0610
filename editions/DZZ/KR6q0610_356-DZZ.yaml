  text: 福州羅山道閑禪師嗣岩頭一日侍岩頭遊山次忽然喚曰和尚頭云作麼師乃近前作禮問和尚豈不是三十年前在洞山又不肯洞山頭云是師云和尚豈不是法嗣徳山又不肯徳山頭云是師曰不肯徳山即不問只如洞山有什麼虧闕頭良久云洞山好佛只是無光師便作禮
