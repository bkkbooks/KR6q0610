  text: 地藏院眞應大師因玄沙問三界唯一心汝作麼生會師指椅子曰和尚喚這箇作什麼沙曰椅子師云和尚不會三界唯心沙云我喚這箇作竹木汝喚作什麼師云某甲亦喚作竹木沙曰盡大地覓一箇會佛法人不可得
