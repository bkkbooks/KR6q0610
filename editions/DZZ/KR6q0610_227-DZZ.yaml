body:
  text: 子昭首座嗣法眼問法眼和尚開堂承嗣何人眼云地藏師云太辜負長慶先師眼云某甲不會長慶一轉語師云何不問眼云萬像之中獨露身意作麼生昭乃竪起拂子眼曰此是長慶處學得底首座分上作麼生師無語眼曰只如萬像之中獨露身是撥萬像不撥萬像師云不撥眼曰兩箇參隨左右皆曰撥萬像眼云萬像之中獨露身𠰚
