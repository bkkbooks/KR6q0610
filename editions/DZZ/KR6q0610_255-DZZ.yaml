  text: 京兆華嚴寺休靜禪師嗣洞山在洞山時問學人未見理路未免情識洞山云汝還見理路也未師曰無理路洞山云什麼處得情識來師曰學人實問洞山曰與麼則直須向萬里無寸草處立師曰無寸草處還許立也無洞山云直須恁麼去
