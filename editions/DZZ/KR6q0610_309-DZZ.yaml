body:
  text: 長沙景岑禪師因秀上座問南泉遷化向甚處去師曰石頭作沙彌參見六祖秀曰不問參見六祖南泉遷化向甚處去師云教伊尋思去秀曰和尚雖有千尺寒松且無抽條石筍師默然秀曰謝和尚答話師亦默然秀擧似三聖聖云若寔與麼猶勝臨濟七歩然雖如此待我明日更驗過乃問承和尚昨日答南泉遷化一則語可謂光前絶後今古罕聞師亦默然
