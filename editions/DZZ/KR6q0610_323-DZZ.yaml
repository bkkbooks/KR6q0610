body:
  text: 務州金華山倶胝和尚嗣天龍凡有詰問唯擧一指後有童子因外人問和尚説何法要童子亦竪起一指師聞遂以刃斷其指童子負痛號哭而去師復召之童子廻首師却竪起一指童子忽然領悟師將順世謂衆云吾得天龍一指頭禪一生受用不盡言訖示滅
