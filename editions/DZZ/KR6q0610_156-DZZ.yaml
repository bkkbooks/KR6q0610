body:
  text: 大潙問仰山承聞子在百丈問一答十是否仰曰不敢師曰佛法向上道取一句作麼生道仰擬開口師便喝師如是三問仰如是三擬答凡被喝仰低頭垂涙曰先師道教我更遇人始得今日便是遇人也便發心看牛三年一日師入山見在樹下坐禪師以杖點背一下仰廻首師云寂子道得也未仰曰雖道不得且不就人別借口師云寂子會也
