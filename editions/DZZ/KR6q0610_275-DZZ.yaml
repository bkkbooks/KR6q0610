body:
  text: 襄州王敬常侍嗣大潙一日與臨濟至僧堂乃問這一堂僧還看經也無曰不看經侍曰還習禪也無曰不習禪侍曰經又不看禪又不習畢竟作什麼濟曰總教成佛作祖去侍曰金屑雖貴落眼成翳又作麼生濟曰我將爲你是箇俗漢
