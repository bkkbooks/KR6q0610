body:
  text: 黄蘗山斷際禪師初黄蘗捨衆入大安精舍混迹勞侶掃洒殿堂時裴休相國入寺燒香主事祗接因觀壁畫乃問是何圖像主事對曰高僧眞儀公曰眞儀可觀高僧何在衆皆無對相國曰此間有禪人否僧曰近有一僧投寺執役頗似禪者公曰可請來詢問得否於是遽尋運師相國公覩之欣然曰休適有一問諸徳吝辭今請上人代醻一語師曰請相國垂問公即擧前問師朗聲云相國公應諾師曰在什麼處公當下有省如獲髻珠曰吾師眞善知識也再請開堂
