body:
  text: 雪峰因僧問古澗寒泉時如何師曰瞪目不見底僧曰飮者如何師曰不從口入後有僧擧似趙州州曰不可從鼻孔裏入僧却問古澗寒泉時如何州曰苦僧曰飮者如何州曰死師聞之云趙州古佛師從此不答話
