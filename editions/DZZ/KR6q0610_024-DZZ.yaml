body:
  text: 鄧州香嚴寺襲燈大師嗣大潙諱智閑其性聰敏在潙山會下多聞博記潙山一日曰汝常所説盡是章疏之中記持得來吾今問汝汝生下爲嬰兒時未辨東西南北當此之時與吾説看師下語并説道理竝不相契又於平生所集文字尋究總無此箇相契時節乃歎悲泣將諸文字以火爇却乃云我此生不敢望會禪且入山修行去便入武當山忠國師舊庵基卓庵一日併淨道路因棄礫撃竹響於時忽然大悟乃有頌曰一撃亡所知更不假修治動容揚古路不墮悄然機處處無蹤跡聲色外威儀諸方達道者咸言上上機潙山聞得云此子徹也
