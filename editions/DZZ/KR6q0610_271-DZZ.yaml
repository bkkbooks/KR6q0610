body:
  text: 後洞山師虔禪師嗣洞山號青林因僧問學人徑往時如何師云死蛇當大路勸子莫當頭僧云當頭時如何師曰亦喪子命根僧曰不當頭時如何師曰亦無廻避處僧曰正當恁麼時如何師曰却失也僧曰未審向什麼處去也師曰草深無覓處僧曰和尚也須隄防始得師撫掌云一等是箇毒氣
