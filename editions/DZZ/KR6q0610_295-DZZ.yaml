  text: 南嶽大慧禪師馬大師闡化於江西師問衆云道一爲衆説法否衆曰已爲衆説法師曰總不見通箇消息來遂因遣一僧去曰待伊上堂時但問作麼生伊道底言語記將來僧去一如師旨廻謂師云馬師曰自從胡亂後三十年不曾闕鹽醤喫師然之
