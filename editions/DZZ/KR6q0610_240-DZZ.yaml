body:
  text: 撫州金峰從志禪師嗣曹山一日上堂喫餬餠次乃拈一箇從上板頭轉一匝大衆見一一合掌師曰假饒十分抬起手也只得一半至晩間請益有僧曰今日和尚行餬餠見衆僧合掌却曰假饒十分抬起手也只得一半請和尚全道師以手作拈起餬餠勢云會麼僧云不會師云金峰也始道得一半
