body:
  text: 曹山因僧問眉與目還相識也無師云不相識曰爲什麼不相識師云爲同在一處曰恁麼即不分也師云眉且不是目曰如何是目師云端的去曰如何是眉師云曹山却疑曰和尚爲什麼却疑師云若不疑即端的去也
