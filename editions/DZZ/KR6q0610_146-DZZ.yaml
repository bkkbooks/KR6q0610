body:
  text: 大潙一日索門人呈語乃云聲色外與吾相見時有幽州鑑弘上座呈語云不辭出來那箇人無眼師不肯仰山凡四度呈語第一曰見取不見取底師曰細如毫末冷似雪霜第二度云聲色外誰求相見師云祗滯聲聞方外榻第三度曰如兩鏡相照於中無像師曰此語正也我是你不是早立像了也仰山却問師某甲精神昏昧拙有祗對未審和尚於百丈師翁處作麼生呈語師云我於百丈先師處呈語云如百千明鏡鑑像光影相照塵塵刹刹各不相借仰山於此禮謝
