body:
  text: 仰山住東平時潙山附書并鏡一面至師陞堂受書乃提起鏡子示衆云大衆潙山將鏡來而今且道是潙山鏡東平鏡若道是東平鏡又是潙山寄來若道是潙山鏡又在東平手裡道得即存取道不得則打破去也如是三擧衆皆無對師乃撲破
