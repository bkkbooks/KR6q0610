body:
  text: 百丈山大智禪師凡參次有一老人常隨衆聽法衆退老人亦退忽一日不退師遂問面前立者復是何人老人云某甲是非人也於過去迦葉佛時曾住此山因學人問大修行底人還落因果也無某甲答他云不落因果後五百生墮野狐身今請和尚代一轉語貴脱野狐身遂問云大修行底人還落因果也無師云不昧因果老人於言下大悟作禮曰某甲已脱野狐身住在山後敢告和尚乞依亡僧事例師令維那白槌告衆云食後送亡僧大衆言議一衆皆安涅槃堂又無病人何故如是食後只見師領衆至山後岩下以杖指出一死野狐乃依法火葬師至晩上堂擧前因縁黄蘗便問古人錯對一轉語墮五百生野狐身轉轉不錯合作箇什麼師曰近前來與汝道蘗遂近前與師一掌師拍手笑云將爲胡鬚赤更有赤鬚胡
