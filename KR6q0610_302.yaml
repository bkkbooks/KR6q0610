body:
  text: 洞山悟本大師曾問雲岩和尚百年後忽有人問還邈得師真如何祗對岩曰但向伊道只這是師良久岩曰承當這箇事大須審細後因供養雲岩真次有僧問先師曰只這是莫便是否師曰是僧云意旨如何師曰當時幾錯會先師語僧曰未審先師還知有也無師云若不知有爭解恁麼道若知有爭肯恁麼道
