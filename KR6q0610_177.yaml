body:
  text: 趙州曰老僧答話去也有解問底致將一問來時有僧出禮拜師云比來抛磚引玉却引得箇墼子下座後法眼擧問覺鐵觜此意如何覺曰與和尚擧箇喩如國家拜將相似問誰人去得有一人曰某去得答曰汝去不得法眼云我會也
