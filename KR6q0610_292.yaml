body:
  text: 定州柏岩山明哲禪師嗣馬祖因洞山與密師伯到師問二上座什麼處來洞山曰湖南師曰觀察使姓什麼曰不得姓師曰名什麼曰不得名師曰還理事也無曰自有廊幕在曰還出入否曰不出入師曰豈不出入洞山拂袖出去師明日侵晨入堂召二上座近前師曰昨日問上座話不愜老僧意一夜不安今請上座別一轉語若愜老僧意便開粥相伴過夏洞山曰却請和尚問師曰豈不出入洞山曰太尊貴生師乃開粥同過夏
