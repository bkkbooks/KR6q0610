body:
  text: 廬山歸宗寺智常禪師嗣馬祖鋤草次有一座主來參偶見一蛇過師遂鋤斷之主曰久響歸宗元來是箇麁行沙門師云你麁我麁主曰如何是麁師竪起鋤頭主曰如何是細師作斬蛇勢主曰與麼則依而行之師曰依而行之且致你甚處見我斬蛇主無對
