body:
  text: 大潙問仰山曰有俗弟子將三束絹與我贖鐘子與世人受福仰云俗弟子即有絹與和尚贖鐘子和尚將何物酬他師以拄杖敲牀三下云我將這箇酬他仰云若是這箇用作什麼師又敲三下云汝嫌這箇作什麼仰云某甲不嫌這箇是大家底師曰汝既知是大家底何得更就我覓物酬他仰云只怪和尚把大家底行人事師曰汝不見達磨大師從西天來此土亦將此物人事汝諸人盡是受他信物者
