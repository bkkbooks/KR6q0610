body:
  text: 潭州龍牙山居遁禪師初參翠微乃問如何是祖師西來意微云與我過禪板來師纔過微接得便打師云打即任打要且無祖師意師又參問臨濟如何是祖師西來意濟曰與我過蒲團來師取蒲團與臨濟濟接得便打師云打即任打要且無祖師意師住院後有僧曰和尚當時還肯二老宿麼師曰肯則肯要且無祖師意
