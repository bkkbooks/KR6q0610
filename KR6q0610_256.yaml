body:
  text: 臺州瑞岩山師彦禪師問夾山與麼即易不與麼即難與麼與麼即惺惺不與麼不與麼即居空界與麼不與麼請師速道山曰老僧謾闍梨去也師喝云這老和尚而今是什麼時節便出去後有僧擧似岩頭頭曰苦哉將我一枝佛法與麼流將去正法眼藏中終
