body:
  text: 香嚴山襲燈禪師因僧問如何是道師曰枯木裏龍吟僧曰不會師曰髑髏裏眼睛後有僧問石霜如何是枯木裏龍吟霜曰猶帶喜在如何是髑髏裏眼睛霜曰猶帶識在又有僧問曹山如何是枯木裏龍吟山云血脈不斷如何是髑髏裏眼睛山云乾不盡僧云未審還有得聞者麼山云盡大地未有一箇不聞僧云未審龍吟是何章句山云也不知是何章句聞者皆喪
