body:
  text: 襄州王敬初常侍一日治事次京兆米和尚至侍乃舉筆示之米曰還判得虛空麼侍乃擲下筆入宅更不復請米和尚致疑明日憑華嚴置茶筵次設問昨日米和尚有何言句便不得相見侍曰師子咬人韓獹逐塊米才聞乃遽出朗笑曰我會也我會也侍曰會即不無你試道看米曰請常侍舉侍乃竪起一隻塊米曰這野狐精侍云這漢徹去也
