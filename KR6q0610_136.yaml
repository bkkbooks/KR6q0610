body:
  text: 大溈山大圓禪師坐次仰山侍立師云寂子近日宗門中令嗣作麼生仰曰大有人疑著此事師云寂子又作麼生仰云某甲祗管困來合眼健即坐禪所以未曾說著師云到這田地也難得仰曰據某甲見處著一句語亦不得師云子為一人也不得仰云自古聖人盡皆如是師云大有人笑汝與麼祗對仰云解笑某甲是某甲同參師云出頭作麼生仰繞禪牀一匝師云裂破古今
