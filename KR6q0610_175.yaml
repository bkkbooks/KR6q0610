body:
  text: 臺山路有一婆子每有僧問臺山路向甚麼處去婆曰驀直去僧才行婆曰好箇阿師又恁麼去前後僧問皆如此後有僧舉似趙州州曰待我為你勘破這老婆州遂往問臺山路向甚處去婆曰驀直去州才行婆云好箇阿師又恁麼去州歸舉似大衆云我為你勘破這老婆了也
