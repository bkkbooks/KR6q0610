body:
  text: 臺山路有一婆子毎有僧問臺山路向甚麼處去婆曰驀直去僧纔行婆曰好箇阿師又恁麼去前後僧問皆如此後有僧擧似趙州州曰待我爲你勘破這老婆州遂往問臺山路向甚處去婆曰驀直去州纔行婆云好箇阿師又恁麼去州歸擧似大衆云我爲你勘破這老婆了也
