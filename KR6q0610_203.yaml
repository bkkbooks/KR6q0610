body:
  text: 福州長慶慧稜禪師嗣雪峰參靈雲師問如何是佛法大意雲云驢事未去馬事到來師如是往來雪峰玄沙三十年間不明此事一日卷起簾忽然大悟乃有頌云也大差也大差卷起簾來見天下有人問我解何宗拈起拂子劈口打峰擧謂玄沙曰此子徹去也未可沙云此是意識著述更須勘過始得至晩衆僧上來問訊峰謂師云備頭陀未肯汝在汝實有正悟對衆擧來師又有頌云萬象之中獨露身唯人自肯乃方親昔時謬向途中覓今日看來火裡氷峰乃顧沙曰不可更是意識著述
