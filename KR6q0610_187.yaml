body:
  text: 芙蓉山道楷禪師問投子山青禪師曰佛祖意句如家常茶飯離此之餘還別有為人言句也無青和尚云汝道寰中天子敕還假禹湯堯舜也無師擬開口青和尚拈拂子驀口打云你發意來時早有二十棒分師於此契悟作禮便行青和尚云且來闍梨師竟不回首青和尚云子到不疑之地耶師掩耳而去
