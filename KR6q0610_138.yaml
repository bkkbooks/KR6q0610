body:
  text: 德山和尚長講金剛經為業後聞南方禪宗大興罔措其由遂罷講散徒携疏鈔南遊先到龍潭才跨門曰久嚮龍潭及乎到來潭又不見龍又不現潭云子親到龍潭師乃禮拜而退至夜入室侍立更深潭曰子何不下師遂珍重揭簾而去見外面黑却回云外面黑潭乃點紙燭度與師方接次潭便吹滅師於是忽然大悟便禮拜潭云子見箇什麼便禮拜師曰某甲自今已後更不疑著天下老和尚舌頭至來日龍潭上堂曰箇中有箇漢牙如劍樹口似血盆一棒打不回頭他時後日向孤峰頂上立吾道去在師遂取疏鈔於法堂前將一炬火提起云窮諸玄辨若一毫致於大虛竭世樞機似一滴投於巨壑將疏鈔便燒於是禮辭
