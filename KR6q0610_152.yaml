body:
  text: 大溈嘗示衆云一切衆生無佛性因鹽官或示衆云一切衆生有佛性鹽官會有二僧遂特詣師會探之既到所聞説法莫測其涯若生輕慢一日在庭中坐次見仰山來遂勸曰師兄切須勤學佛法不得容易仰山遂作一圓相托呈却拋向背後復展兩手就二僧索二僧茫然不知所措仰山乃勸云直須勤學佛法不得容易珍重便去二僧逮返鹽官將行三十里一人忽然有省自嘆云當知溈山云一切衆生無佛性誠不錯也却回溈山一人又行數里因渡水亦有省處自嘆曰溈山道一切衆生無佛性灼然有他與麼道亦返溈山
