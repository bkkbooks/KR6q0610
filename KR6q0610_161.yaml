body:
  text: 玄則禪師嗣法眼在法眼會中一日眼云你在此間多少時耶師曰在和尚會已得三年眼云你是後生尋常何不問事師曰某甲不敢瞞和尚某甲曾在青峰處得箇安樂處眼云你因甚語得入師曰曾問青峰如何是學人自己峰云丙丁童子來求火眼云好語祗恐你不會師云丙丁屬火將火求火似將自己覓自己眼云情知你不會佛法若如是不到今日師乃操悶便起至中路却云他是五百人善知識道我不是必有長處却回懺悔便問如何是學人自己眼云丙丁童子來求火師言下大悟
  hash: sha256:2e5e5455fa75cbbc2dd9617e2bd7a1d29133c32763f097407047980b0128ea25
