body:
  text: 洪州江西馬祖大寂禪師嗣南嶽諱道一參侍南嶽密受心印蓋拔同參住傳法院常日坐禪南嶽知是法器往師所問曰大德坐禪圖箇什麼師曰圖作佛南嶽乃取一㙛於師庵前石上磨師遂問師作什麼南嶽曰磨作鏡師曰磨㙛豈得成鏡耶南嶽曰坐禪豈得作佛耶師曰如何即是南嶽曰如人駕車車若不行打車即是打牛即是師無對南嶽又示曰汝為學坐禪為學坐佛若學坐禪禪非坐臥若學坐佛佛非定相於無住法不應取捨汝若坐佛即是殺佛若執坐相非達其理師聞示誨如飮醍醐
