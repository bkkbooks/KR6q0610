body:
  text: 雲門大師云光不透脱有兩般病一切處不明面前有物是一透得一切法空隱隱地似有箇物相似亦是光不透脱又法身亦有兩般病得到法身爲法執不忘己見猶存墮在法身邊是一直饒透得放過即不可子細檢點將來有什麼氣息亦是病
